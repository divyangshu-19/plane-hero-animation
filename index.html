<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PlaneHero Demo</title>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: #0a0a0f; color: #fff; }
    .hero { height: 100vh; }
    .content {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      opacity: 0.3;
      border-top: 1px solid rgba(255,255,255,0.05);
    }
  </style>
</head>
<body>

  <div id="hero" class="hero"></div>
  <div class="content">Section 1 — the plane flies through here</div>
  <div class="content">Section 2 — still visible, overlapping</div>
  <div class="content">Section 3 — Y-axis flexibility in action</div>

  <script type="module">
    import { PlaneHero } from './plane-component.js';

    new PlaneHero('#hero', {
      model: 'plane1.glb',
      settings: {
        desktop: {
          easing: "easeInOut",
          sx: -6, sy: 0.5, sz: -6,
          ex: 5, ey: 0, ez: 6,
          ss: 2, es: 4.4,
          rx: -0.03, ry: 0.75, rz: 0.08,
          speed: 0.35, floatAmp: 0.05, floatSpd: 1,
          camZ: 12, camY: 2
        },
        mobile: {
          easing: "linear",
          sx: -2, sy: 3, sz: -8,
          ex: 2, ey: -1, ez: 4,
          ss: 1.5, es: 3.5,
          rx: 0.1, ry: 0.5, rz: 0.05,
          speed: 0.4, floatAmp: 0.03, floatSpd: 0.8,
          camZ: 14, camY: 2.5
        }
      }
    });

    // Or just use a flat settings object (no breakpoint switching):
    // new PlaneHero('#hero', {
    //   model: 'plane1.glb',
    //   settings: { easing: "easeInOut", sx: -6, sy: 0.5, sz: -6, ex: 5, ey: 0, ez: 6, ss: 2, es: 4.4, rx: -0.03, ry: 0.75, rz: 0.08, speed: 0.35, floatAmp: 0.05, floatSpd: 1, camZ: 12, camY: 2 }
    // });
  </script>

</body>
</html>
