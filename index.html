<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HYER® - Beyond Travel</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background: #000D10;
      color: #fff;
      overflow-x: hidden;
    }

    canvas {
      display: block;
    }

    #hero {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }

    #canvas-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    .overlay {
      position: relative;
      z-index: 10;
      height: 100vh;
      display: flex;
      flex-direction: column;
      pointer-events: none;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 32px 48px;
      pointer-events: auto;
    }

    .logo svg {
      height: 24px;
    }

    nav ul {
      display: flex;
      list-style: none;
      gap: 40px;
    }

    nav a {
      color: #fff;
      text-decoration: none;
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 0.5px;
      opacity: 0.7;
      transition: opacity 0.3s;
    }

    nav a:hover { opacity: 1; }

    .menu-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.15);
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: auto;
    }

    .menu-btn span {
      display: block;
      width: 18px;
      height: 2px;
      background: #fff;
      position: relative;
    }

    .menu-btn span::before,
    .menu-btn span::after {
      content: '';
      position: absolute;
      width: 100%;
      height: 2px;
      background: #fff;
      left: 0;
    }

    .menu-btn span::before { top: -6px; }
    .menu-btn span::after { top: 6px; }

    .hero-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0 48px;
    }

    .hero-title {
      font-size: 120px;
      font-weight: 300;
      letter-spacing: -3px;
      line-height: 1;
      margin-bottom: auto;
      padding-top: 80px;
      opacity: 0;
      transform: translateY(40px);
      animation: fadeUp 1s 0.3s forwards;
    }

    .hero-bottom {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      padding-bottom: 48px;
      opacity: 0;
      transform: translateY(40px);
      animation: fadeUp 1s 0.6s forwards;
    }

    .hero-subtitle {
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
      opacity: 0.6;
      font-weight: 400;
    }

    .hero-buttons {
      display: flex;
      gap: 16px;
    }

    .hero-buttons a {
      display: inline-block;
      padding: 12px 28px;
      border: 1px solid rgba(255,255,255,0.25);
      color: #fff;
      text-decoration: none;
      font-size: 13px;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: all 0.3s;
      pointer-events: auto;
    }

    .hero-buttons a:hover {
      background: #fff;
      color: #000D10;
    }

    @keyframes fadeUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .scroll-section {
      min-height: 200vh;
      background: #000D10;
    }

    .scroll-indicator {
      position: absolute;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      opacity: 0;
      animation: fadeUp 1s 1s forwards;
      pointer-events: none;
    }

    .scroll-indicator span {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      opacity: 0.4;
    }

    .scroll-line {
      width: 1px;
      height: 40px;
      background: linear-gradient(to bottom, rgba(255,255,255,0.5), transparent);
    }

    @media (max-width: 768px) {
      header { padding: 20px 24px; }
      .hero-content { padding: 0 24px; }
      .hero-title { font-size: 48px; letter-spacing: -1px; }
      nav ul { gap: 20px; }
      nav a { font-size: 12px; }
      .hero-bottom { flex-direction: column; align-items: flex-start; gap: 20px; }
    }
  </style>
</head>
<body>

<div id="hero">
  <div id="canvas-container"></div>

  <div class="overlay">
    <header>
      <div class="logo">

        </svg>
      </div>

      <nav>
        <ul>
          <li><a href="#">Solutions</a></li>
          <li><a href="#">About us</a></li>
          <li><a href="#">Contact</a></li>
        </ul>
      </nav>

      <button class="menu-btn"><span></span></button>
    </header>

    <div class="hero-content">
      <h1 class="hero-title">Beyond Travel.</h1>

      <div class="hero-bottom">
        <span class="hero-subtitle">Flights, stays and personalised experiences.</span>
        <div class="hero-buttons">
          <a href="#">Hyer® Stays</a>
          <a href="#">Hyer® Travel</a>
        </div>
      </div>
    </div>

    <div class="scroll-indicator">
      <span>Scroll</span>
      <div class="scroll-line"></div>
    </div>
  </div>
</div>

<div class="scroll-section"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// --- Scene setup ---
const container = document.getElementById('canvas-container');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000D10);

const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
camera.position.set(0, 2, 14);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setSize(container.clientWidth, container.clientHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.5;
container.appendChild(renderer.domElement);

// --- Lights ---
const ambientLight = new THREE.AmbientLight(0x404060, 0.5);
scene.add(ambientLight);

const mainLight = new THREE.DirectionalLight(0xffeedd, 2);
mainLight.position.set(5, 10, 7);
mainLight.castShadow = true;
scene.add(mainLight);

const fillLight = new THREE.DirectionalLight(0x4488ff, 0.8);
fillLight.position.set(-3, 4, -5);
scene.add(fillLight);

const rimLight = new THREE.DirectionalLight(0xffffff, 1);
rimLight.position.set(0, -2, -8);
scene.add(rimLight);

// --- Starfield background ---
const starsGeometry = new THREE.BufferGeometry();
const starsCount = 2000;
const starPositions = new Float32Array(starsCount * 3);
for (let i = 0; i < starsCount * 3; i++) {
  starPositions[i] = (Math.random() - 0.5) * 200;
}
starsGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
const starsMaterial = new THREE.PointsMaterial({
  color: 0xffffff,
  size: 0.15,
  transparent: true,
  opacity: 0.8,
  sizeAttenuation: true,
});
const stars = new THREE.Points(starsGeometry, starsMaterial);
scene.add(stars);

// --- Load GLB airplane model ---
const planeGroup = new THREE.Group();

const loader = new GLTFLoader();
loader.load(
  'https://raw.githubusercontent.com/nicola-attico/3d-models/main/boeing_777_airplane.glb',
  (gltf) => {
    const model = gltf.scene;
    model.traverse((child) => {
      if (child.isMesh) {
        child.castShadow = true;
        child.receiveShadow = true;
      }
    });
    // The model's nose faces -Z (Three.js default).
    // Rotate so nose faces +Z to match our animation convention
    model.rotation.y = Math.PI;
    planeGroup.add(model);
  },
  (xhr) => {
    console.log(`Loading model: ${Math.round((xhr.loaded / xhr.total) * 100)}%`);
  },
  (error) => {
    console.error('Error loading model:', error);
  }
);

scene.add(planeGroup);

// --- Scroll animation ---
let scrollProgress = 0;

function updateScroll() {
  const hero = document.getElementById('hero');
  const heroHeight = hero.offsetHeight;
  const scrollY = window.scrollY;
  const maxScroll = heroHeight * 0.35;
  scrollProgress = Math.min(scrollY / maxScroll, 1);
}

window.addEventListener('scroll', updateScroll);

// --- Resize ---
function onResize() {
  const w = container.clientWidth;
  const h = container.clientHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
}

window.addEventListener('resize', onResize);

let time = 0;

// --- Animation loop ---
function animate() {
  requestAnimationFrame(animate);

  time += 0.01;
  const p = scrollProgress;

  // --- Plane position ---
  // Flies from far-left/back to right/front (coming toward the viewer)
  const tx = -6 + p * 11;
  const ty = 0.5 + Math.sin(time) * 0.05 - p * 0.5;
  const tz = -6 + p * 12;

  planeGroup.position.set(tx, ty, tz);

  // --- Plane rotation ---
  // Constant orientation: always faces right and slightly toward the viewer
  // ry = facing ~43° right of straight-ahead (matches the flight path angle)
  const rx = -0.03;
  const ry = 0.75;
  const rz = 0.08;

  planeGroup.rotation.x = rx;
  planeGroup.rotation.y = ry;
  planeGroup.rotation.z = rz;

  // Scale grows as it approaches the camera
  const s = 0.025 + p * 0.03;
  planeGroup.scale.set(s, s, s);

  // Camera stays fixed
  camera.position.set(0, 2, 12);
  camera.lookAt(0, 0, 0);

  // Stars rotate slowly
  stars.rotation.y = time * 0.015;
  stars.rotation.x = Math.sin(time * 0.008) * 0.03;

  renderer.render(scene, camera);
}

animate();
updateScroll();
</script>

</body>
</html>
